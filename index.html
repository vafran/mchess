<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith Chess</title>
    <meta http-equiv="refresh" content="0; url=mChess.html">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #f3e8ff 100%);
            color: #3b0764;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.82);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(120, 40, 200, 0.18);
            border: 1px solid rgba(168, 85, 247, 0.15);
        }
        h2 { margin-top: 0; font-size: 2rem; }
        p { color: #7c3aed; margin-bottom: 25px; font-weight: bold; }
        a { 
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #ec4899); 
            color: white; 
            font-weight: bold; 
            text-decoration: none; 
            padding: 12px 24px; 
            border-radius: 14px; 
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: transform 0.2s;
        }
        a:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h2>♟️ Monolith Chess</h2>
        <p id="msg">Loading / Cargando...</p>
        <a href="mChess.html" id="btn">Play / Jugar</a>
    </div>

    <script>
        // Detectar el idioma del navegador
        const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
        
        // Cambiar los textos según el idioma
        if (lang.startsWith('es')) {
            document.getElementById('msg').innerText = "Entrando al juego...";
            document.getElementById('btn').innerText = "Jugar ahora";
        } else {
            document.getElementById('msg').innerText = "Entering the game...";
            document.getElementById('btn').innerText = "Play now";
        }

        // Ejecutar la redirección por JavaScript
        window.location.replace("mChess.html");
    </script>
</body>
</html>
